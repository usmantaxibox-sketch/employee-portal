<!DOCTYPE html>
<html>
<head>
  <title>Login - Employee Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2 style="text-align:center;">Employee Login</h2>

  <input type="text" id="empId" placeholder="Employee ID">
  <input type="password" id="password" placeholder="Password">

  <button class="btn" onclick="login()">Login</button>
</div>

<script>
const API = "PASTE_YOUR_WEB_APP_URL_HERE";  // <-- IMPORTANT

function login(){
  const id = document.getElementById("empId").value;
  const password = document.getElementById("password").value;

  fetch(API + "?action=login&id=" + id + "&password=" + password)
  .then(res => res.text())
  .then(data => {
      if(data === "success"){
          window.location.href = "dashboard.html?id=" + id;
      } else {
          alert("Invalid ID or Password");
      }
  });
}
</script>

</body>
</html>
