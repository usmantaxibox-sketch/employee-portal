<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<script>
if (sessionStorage.getItem("role") !== "rider") {
    window.location.href = "login.html";
}
</script>

<div class="login-card">
    <h2>Welcome <span id="name"></span></h2>

    <p>Performance: <span id="performance"></span></p>
    <p>Record: <span id="record"></span></p>

    <a id="pdfLink" target="_blank">View PDF</a>
    <br><br>

    <button class="login-btn" onclick="logout()">Logout</button>
</div>

<script>
function logout(){
    sessionStorage.clear();
    window.location.href = "login.html";
}

const employeeId = sessionStorage.getItem("employeeId");

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRcyRF_oS_SGrk-F-Urp3YhtwbPG2FESw0CfEh7tS-pZ9fJhY6VPLTIGVD1wLD-VZE16htkQMBJ0RNa/pub?output=csv")
.then(res => res.text())
.then(data => {
    const rows = data.split("\n");

    rows.forEach(row => {
        const cols = row.split(",");

        if(cols[0] === employeeId){
            document.getElementById("name").innerText = cols[1];
            document.getElementById("performance").innerText = cols[2];
            document.getElementById("record").innerText = cols[3];
            document.getElementById("pdfLink").href = cols[4];
        }
    });
});
</script>

</body>
</html>
