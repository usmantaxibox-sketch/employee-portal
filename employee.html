<!DOCTYPE html>
<html>

<head>
    <title>TaxiBox Heros</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="card">
        <h2>Welcome <span id="name"></span></h2>

        <p>Performance: <span id="performance"></span>%</p>
        <p>Record: <span id="record"></span></p>

        <a id="pdfLink" target="_blank">View PDF</a>

        <canvas id="chart"></canvas>

        <button onclick="logout()">Logout</button>
    </div>

    <script src="script.js"></script>
    <script>loadEmployee();</script>
    <script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vShqOBEBnFtC0WGU2e1KkZyan7PPUJwq7eN6wHSbnDaE-cdamScQSNKrhy6C0xkKnFj5HKMo7cj4f4Z/pub?output=csv")
.then(response => response.text())
.then(data => {
    const rows = data.split("\n");
    rows.forEach(row => {
        const cols = row.split(",");
        if(cols[0] === "EMP001") {
            document.getElementById("performance").innerHTML =
                "Performance: " + cols[2] + "<br>Deliveries: " + cols[3];
        }
    });
});
</script>
</body>


</html>
