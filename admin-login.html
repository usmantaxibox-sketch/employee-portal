<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:white;font-family:Arial;">

  <div style="background:#222;padding:40px;border-radius:10px;">
    <h2>Admin Login</h2>

    <input type="password" id="adminPass" placeholder="Enter Password"
           style="padding:10px;width:200px;margin-bottom:10px;"><br>

    <button onclick="checkAdmin()" 
            style="padding:10px 20px;background:blue;color:white;border:none;">
      Login
    </button>
  </div>

<script>
function checkAdmin(){

   const pass = document.getElementById("adminPass").value;

   if(pass === "admin123"){   // change your password here
      sessionStorage.setItem("adminLoggedIn", "true");
      window.location.href = "admin-dashboard.html";
   }else{
      alert("Wrong Password!");
   }
}
</script>

</body>
</html>
