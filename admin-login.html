<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-card">

    <div class="role-badge">Admin Portal</div>
    <h2>Admin Login</h2>

    <form id="adminForm">
        <input type="text" id="adminId" placeholder="Enter Admin ID" required>
        <input type="password" id="adminPassword" placeholder="Enter Password" required>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <p id="error" style="color:red;"></p>

</div>

<script>
document.getElementById("adminForm").addEventListener("submit", function(e){

    e.preventDefault(); // 🚀 VERY IMPORTANT (Stops page refresh)

    const id = document.getElementById("adminId").value.trim();
    const pass = document.getElementById("adminPassword").value.trim();

    const ADMIN_ID = "admin1";
    const ADMIN_PASS = "1234";

    if(id === ADMIN_ID && pass === ADMIN_PASS){

        sessionStorage.setItem("role", "admin");
        window.location.href = "admin-dashboard.html";

    } else {
        document.getElementById("error").innerText = "Invalid Admin Credentials";
    }

});
</script>

</body>
</html>
