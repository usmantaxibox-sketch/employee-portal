<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-card">
    <h2>Admin Login</h2>

    <input type="text" id="adminId" placeholder="Admin ID" required>
    <input type="password" id="adminPassword" placeholder="Password" required>

    <button class="login-btn" onclick="adminLogin()">Sign In</button>

    <p id="error" style="color:red;"></p>
</div>

<script>
function adminLogin(){

    const id = document.getElementById("adminId").value.trim();
    const pass = document.getElementById("adminPassword").value.trim();

    // 🔐 CHANGE THESE TO YOUR ADMIN LOGIN
    const ADMIN_ID = "admin1";
    const ADMIN_PASS = "1234";

    if(id === ADMIN_ID && pass === ADMIN_PASS){

        // ✅ Save role
        sessionStorage.setItem("role", "admin");
        sessionStorage.setItem("employeeId", id);

        // ✅ Redirect
        window.location.href = "admin-dashboard.html";

    } else {
        document.getElementById("error").innerText = "Invalid Admin ID or Password";
    }
}
</script>

</body>
</html>
