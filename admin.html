<!DOCTYPE html>
<html>
<head>
    <title>TaxiBox Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
    <h2>🚖 TaxiBox</h2>
    <a href="#">Dashboard</a>
    <a href="#">Riders</a>
    <a href="#">Reports</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <input type="text" id="searchId" placeholder="Search Employee ID">
        <button onclick="searchEmployee()">Search</button>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total Riders</h3>
            <p>250</p>
        </div>
        <div class="card">
            <h3>Total Deliveries</h3>
            <p>5000</p>
        </div>
        <div class="card">
            <h3>Active Cities</h3>
            <p>12</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="performanceChart"></canvas>
    </div>

    <div id="result" class="result-box"></div>

</div>

<script>
if (!localStorage.getItem("isAdminLoggedIn")) {
    window.location.href = "admin-login.html";
}

function logout() {
    localStorage.removeItem("isAdminLoggedIn");
    window.location.href = "admin-login.html";
}

function searchEmployee() {
    const id = document.getElementById("searchId").value;
    const result = document.getElementById("result");

    if (id === "EMP001") {
        result.innerHTML = "<h3>Employee Found</h3><p>Performance: 92%</p><p>Deliveries: 340</p>";
    } else {
        result.innerHTML = "<p>No record found</p>";
    }
}

/* Chart */
const ctx = document.getElementById('performanceChart').getContext('2d');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Weekly Deliveries',
            data: [50,60,55,70,80,90,65],
            backgroundColor: '#00c6ff'
        }]
    }
});
</script>

</body>
</html>
