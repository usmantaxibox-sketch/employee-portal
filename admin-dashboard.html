<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body{
background:#0f1b2d;
font-family:Arial;
color:white;
padding:30px;
}

h1{
margin-bottom:30px;
}

.table-container{
background:#182a46;
padding:20px;
margin-bottom:40px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #2e4469;
text-align:left;
}

th{
background:#243b63;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div id="tables"></div>

<script>

const spreadsheetID="1uGI3YTIulDphtao-gX4bsFcBQQNUEEDjYzKydoqSApQ";

/* LIST YOUR SHEET NAMES HERE */

const sheets=[
"PERFORMANCE",
"SALARY",
"VACATION"
"RIDERS_MASTER"
"USERS"
];

const container=document.getElementById("tables");

sheets.forEach(sheet=>{

fetch(`https://opensheet.elk.sh/${spreadsheetID}/${sheet}`)
.then(res=>res.json())
.then(data=>{

if(data.length===0)return;

let tableHTML=`
<div class="table-container">
<h2>${sheet}</h2>
<table>
<thead>
<tr>
`;

Object.keys(data[0]).forEach(col=>{
tableHTML+=`<th>${col}</th>`;
});

tableHTML+=`</tr></thead><tbody>`;

data.forEach(row=>{
tableHTML+="<tr>";

Object.values(row).forEach(val=>{
tableHTML+=`<td>${val}</td>`;
});

tableHTML+="</tr>";
});

tableHTML+=`
</tbody>
</table>
</div>
`;

container.innerHTML+=tableHTML;

});

});

</script>

</body>
</html>
