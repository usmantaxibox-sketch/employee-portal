<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<script>
if (sessionStorage.getItem("role") !== "admin") {
    window.location.href = "admin-login.html";
}
</script>

<div class="login-card">
    <h2>Admin Dashboard</h2>

    <input type="text" id="searchId" placeholder="Enter Employee ID">
    <button class="login-btn" onclick="searchEmployee()">Search</button>

    <div id="result"></div>
    <br>
    <button class="login-btn" onclick="logout()">Logout</button>
</div>

<script>
function logout(){
    sessionStorage.clear();
    window.location.href = "admin-login.html";
}

function searchEmployee(){
    const id = document.getElementById("searchId").value;

    fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRcyRF_oS_SGrk-F-Urp3YhtwbPG2FESw0CfEh7tS-pZ9fJhY6VPLTIGVD1wLD-VZE16htkQMBJ0RNa/pub?output=csv")
    .then(res => res.text())
    .then(data => {
        const rows = data.split("\n");
        let found = false;

        rows.forEach(row => {
            const cols = row.split(",");

            if(cols[0] === id){
                document.getElementById("result").innerHTML = `
                    <p>Name: ${cols[1]}</p>
                    <p>Performance: ${cols[2]}</p>
                    <p>Record: ${cols[3]}</p>
                `;
                found = true;
            }
        });

        if(!found){
            document.getElementById("result").innerHTML = "Employee Not Found";
        }
    });
}
</script>

</body>
</html>
