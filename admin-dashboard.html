<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1b2d;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#111f36;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#6c9cff;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.main{
margin-left:240px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1b2b45;
padding:20px;
border-radius:10px;
text-align:center;
}

.table-box{
background:#1b2b45;
padding:20px;
border-radius:10px;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #2f4b7c;
}

th{
background:#223b63;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin</h2>

<a href="#">Dashboard</a>
<a href="#">Employees</a>
<a href="#">Performance</a>
<a href="#">Records</a>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Employees</h3>
<h2 id="empCount">0</h2>
</div>

<div class="card">
<h3>Total Records</h3>
<h2 id="recCount">0</h2>
</div>

<div class="card">
<h3>Performance</h3>
<h2>Active</h2>
</div>

<div class="card">
<h3>Status</h3>
<h2>Online</h2>
</div>

</div>


<canvas id="chart"></canvas>


<div id="tables"></div>


</div>



<script>

const sheetID="1uGI3YTIulDphtao-gX4bsFcBQQNUEEDjYzKydoqSApQ";

const sheets=[
"Employees",
"Performance",
"Records"
];


const container=document.getElementById("tables");


sheets.forEach(sheet=>{

fetch(`https://opensheet.elk.sh/${sheetID}/${sheet}`)
.then(res=>res.json())
.then(data=>{

if(data.length==0)return;


if(sheet==="Employees")
document.getElementById("empCount").innerText=data.length;

if(sheet==="Records")
document.getElementById("recCount").innerText=data.length;



let table=`<div class="table-box">

<h2>${sheet}</h2>

<table>

<tr>`;


Object.keys(data[0]).forEach(col=>{

table+=`<th>${col}</th>`;

});


table+=`</tr>`;


data.forEach(row=>{

table+="<tr>";

Object.values(row).forEach(val=>{

table+=`<td>${val}</td>`;

});

table+="</tr>";

});


table+=`</table></div>`;


container.innerHTML+=table;



});


});



/* CHART */

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:["Jan","Feb","Mar","Apr","May"],
datasets:[{
label:"Performance",
data:[12,19,8,15,20],
borderColor:"cyan",
fill:false
}]
}

});



function logout(){

window.location="index.html";

}

</script>

</body>
</html>
